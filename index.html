<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Natte Zoen Predictor 💋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .predictor-container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 1rem 0;
            transition: transform 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
        }
        
        .result {
            margin: 1.5rem 0;
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .advice {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }
        
        .weather-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
            text-align: left;
        }
        
        .weather-item {
            background: #f8f9fa;
            padding: 0.5rem;
            border-radius: 5px;
        }
        
        footer {
            background: rgba(255,255,255,0.1);
            padding: 1.5rem;
            text-align: center;
            margin-top: auto;
            width: 100%;
        }
        
        footer a {
            color: white;
            text-decoration: none;
            margin: 0 0.5rem;
            transition: opacity 0.2s;
        }
        
        footer a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <div class="predictor-container">
            <h1>💋 Natte Zoen Predictor</h1>
            <p>Check om te weten of je op een natte zoen kunt rekenen.</p>
            
            <button class="button" onclick="checkNatteZoen()">
                Check de natte zoen-kans
            </button>
            
            <div class="result" id="result">0%</div>
            
            <div class="advice" id="advice">
                Advies komt hier...
            </div>
            
            <div class="weather-info">
                <div class="weather-item">🌡️ Temperatuur: <span id="temp">-</span></div>
                <div class="weather-item">💧 Luchtvochtigheid: <span id="humidity">-</span></div>
                <div class="weather-item">🌧️ Neerslagkans: <span id="precip">-</span></div>
                <div class="weather-item">☀️ UV-index: <span id="uv">-</span></div>
            </div>
        </div>
    </main>
    
    <footer>
        <a href="privacy.html">Privacyverklaring</a> · kpstudio478@gmail.com 
    </footer>
</body>
</html>
